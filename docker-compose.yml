services:
  honjang-backend:
    build: ./backend
    container_name: honjang-backend
    ports:
      - "8787:8000"
    env_file:
      - ./backend/.env
    volumes:
      - honjang-data:/app/data
    restart: unless-stopped
    networks:
      - dokploy-network

volumes:
  honjang-data:

networks:
  dokploy-network:
    external: true